<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eicamargo</title>
    <link rel="stylesheet" type="text/css" href="css/eicamargo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="icon" type="image/icon" href="css/img/logoeicamargo.png">

    <meta name="author" content="Alexandre Castello, David Melquiades, Bruna de Mello e Julia Akemi">
</head>
<!--TELA DE LOGIN FEITA POR ALEXANDRE E MELQUIADES. -->

<body>
    <div class="caixa-principal">
        <div class="lado-esquerdo">
            <h1>EICamargo</h1>
            <p>
                Plataforma acadêmica para alunos e professores.
                Entre na sua conta ou crie uma nova para começar.
            </p>
            <div class="foto-creditos">
                <img class="logo-camargo" src="css/img/camargologo.png">
                <p class="escita-logo">Desenvolvido por Estudantes</p>
            </div>
        </div>
        <div class="lado-direito">
            <div class="cartao-login">
                <h2>Entrar</h2>
                <form id="form-login">
                    <div class="input">
                        <label>E-mail</label>
                        <input type="email" placeholder="Digite seu e-mail " id="email" required>
                    </div>

                    <div class="input">
                        <label>Senha</label>
                        <input type="password" placeholder="Digite sua senha" id="senha" required>
                    </div>
                    <button type="submit" id="botaoEntrar" class="botao-entrar">
                        Entrar
                    </button>
                </form>
                <div class="linha"></div>
                <p class="texto-cadastro">
                    Ainda não possui conta?
                </p>
                <button class="botao-cadastro">
                    Registrar-se
                </button>
            </div>
        </div>
    </div>
    <script src="js/botaoentrar.js"></script>
</body>

</html>
